apiVersion: apps/v1
kind: Deployment
metadata:
  name: profileservice
spec:
  replicas: {{ .Values.profile.replicas }}
  selector:
    matchLabels:
      app: profileservice
  template:
    metadata:
      labels:
        app: profileservice
    spec:
      containers:
      - name: profileservice
        image: {{ .Values.profile.image }}
        ports:
        - containerPort: 3000
